# Fly.io configuration for quiz-pack-api (issue #33).
# Deploy from repository root: `fly deploy -c apps/quiz-pack-api/fly.toml`.
app = "quiz-pack-api"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"
  build_context = "../.."

# Phase 1 ships the web process group only. The ARQ worker process group is
# wired in Task 1.10 (app.worker.WorkerSettings does not exist yet); uncomment
# the [processes] block below at that point.
# [processes]
#   web = "uvicorn app.main:app --host 0.0.0.0 --port 8003"
#   worker = "arq app.worker.WorkerSettings"

[[services]]
  protocol = "tcp"
  internal_port = 8003
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    grace_period = "30s"
    interval = "30s"
    timeout = "10s"
    method = "GET"
    path = "/health"
