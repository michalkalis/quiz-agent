name: iOS CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/ios-app/**'
      - '.github/workflows/ios-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/ios-app/**'
      - '.github/workflows/ios-ci.yml'
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test iOS App
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ hashFiles('apps/ios-app/CarQuiz/CarQuiz.xcodeproj/project.pbxproj') }}
          restore-keys: spm-

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show build environment
        run: |
          xcodebuild -version
          xcrun simctl list devices available | grep iPhone

      - name: Build and test
        run: |
          cd apps/ios-app/CarQuiz
          xcodebuild test \
            -scheme CarQuiz-Local \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            | xcpretty || true

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: apps/ios-app/CarQuiz/TestResults.xcresult
          retention-days: 7

  verify-api-models:
    name: Verify API Models Match Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install backend dependencies
        run: |
          uv pip install --system -e apps/quiz-agent
          uv pip install --system -e packages/shared

      - name: Start backend to generate OpenAPI spec
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-key' }}
        run: |
          cd apps/quiz-agent
          uvicorn app.main:app --host 0.0.0.0 --port 8002 &
          sleep 5

      - name: Download and archive OpenAPI spec
        run: |
          curl -f http://localhost:8002/openapi.json -o openapi-current.json

      - name: Upload OpenAPI spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec-for-ios
          path: openapi-current.json
          retention-days: 7
