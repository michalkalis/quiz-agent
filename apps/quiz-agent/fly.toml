# Fly.io configuration for Quiz Agent API
app = "quiz-agent-api"
primary_region = "cdg"

# Build from repository root to access monorepo packages
# Deploy command: cd ../../ && fly deploy -c apps/quiz-agent/fly.toml
[build]
  dockerfile = "Dockerfile"
  build_context = "../.."

[env]
  # Drives Sentry env labeling and the production-only startup SECURITY
  # warnings (warn_if_insecure_production) — without it prod boots as
  # "development" and every prod-only check is silently skipped (#65).
  ENVIRONMENT = "production"

[[services]]
  protocol = "tcp"
  internal_port = 8002
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  # Health check configuration
  # App takes ~8 seconds to start, so give it longer grace period
  [[services.http_checks]]
    grace_period = "30s"
    interval = "30s"
    timeout = "10s"
    method = "GET"
    path = "/api/v1/health"

[[mounts]]
  source = "quiz_agent_data"
  destination = "/data"

# Prod runs 512MB (set via `fly scale`, not its toml); 256MB default fails the
# boot health check — pin it here so redeploys keep parity.
[[vm]]
  memory = "512mb"
