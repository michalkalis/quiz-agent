[project]
name = "quiz-shared"
version = "0.1.0"
description = "Shared models and utilities for quiz system"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0.0",
    "sqlalchemy>=2.0.0",
    "python-dotenv>=1.0.0",
    "openai>=1.0.0",
    # quiz_shared/llm/factory.py — explicit httpx.Timeout on openai_client();
    # already an openai transitive dep, declared directly now that we import
    # it (project_dockerfile_drift: don't rely on a transitive-only import).
    "httpx>=0.27.0",
    "asyncpg>=0.29.0",
    "pgvector>=0.3.0",
    # Direct import in quiz_shared/utils/embeddings.py — used to ride in
    # transitively via chromadb; must stay declared now that chromadb is gone
    # (#41) or prod boots crash-loop on ModuleNotFoundError.
    "numpy>=1.26.0",
    # quiz_shared/auth/tokens.py (#95) — shared JWT sign/verify.
    "pyjwt>=2.8.0",
    # quiz_shared/net/util.py (backend arch review 2026-07-18) — fly_client_ip
    # promoted from both apps; both already depend on these directly, declared
    # here too now that quiz_shared imports them (project_dockerfile_drift).
    "fastapi>=0.104.0",
    "slowapi>=0.1.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["quiz_shared"]
