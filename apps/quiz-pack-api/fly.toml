# Fly.io configuration for quiz-pack-api (issue #33).
# Deploy from repository root: `fly deploy -c apps/quiz-pack-api/fly.toml`.
app = "quiz-pack-api"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"
  build_context = "../.."

# Task 1.10 wired the ARQ worker process group. Both web and worker run as
# separate Fly process groups sharing the same image.
[processes]
  web = "uvicorn app.main:app --host 0.0.0.0 --port 8003"
  worker = "arq app.worker.WorkerSettings"

# 256MB OOM-kills the web process at import time (chromadb/onnxruntime pulled in
# via quiz_shared.database) — see incident 2026-07-05. Workers run 2 concurrent
# LLM-heavy generation jobs, so they get the same headroom.
[[vm]]
  processes = ["web", "worker"]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[services]]
  processes = ["web"]
  protocol = "tcp"
  internal_port = 8003
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    grace_period = "30s"
    interval = "30s"
    timeout = "10s"
    method = "GET"
    path = "/health"
