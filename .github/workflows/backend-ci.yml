name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/quiz-agent/**'
      - 'apps/quiz-pack-api/**'
      - 'packages/shared/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/quiz-agent/**'
      - 'apps/quiz-pack-api/**'
      - 'packages/shared/**'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-backend:
    name: Test Quiz Agent Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv pip install --system -e apps/quiz-agent
          uv pip install --system -e packages/shared
          uv pip install --system pytest pytest-cov pytest-asyncio httpx

      - name: Run backend tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd apps/quiz-agent
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: github.event_name == 'pull_request'
        with:
          file: ./apps/quiz-agent/coverage.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  lint-backend:
    name: Lint Backend Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv pip install --system ruff

      - name: Run ruff linter
        run: |
          ruff check apps/quiz-agent/ packages/shared/

      - name: Run ruff formatter
        run: |
          ruff format --check apps/quiz-agent/ packages/shared/

  test-quiz-pack-api:
    name: Test Quiz Pack API (integration)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: quiz
          POSTGRES_PASSWORD: quiz
          POSTGRES_DB: quiz_pack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quiz -d quiz_pack_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://quiz:quiz@localhost:5432/quiz_pack_test
      TEST_DATABASE_URL: postgresql://quiz:quiz@localhost:5432/quiz_pack_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv pip install --system -e "apps/quiz-pack-api[test]"
          uv pip install --system -e packages/shared
          uv pip install --system pytest pytest-asyncio httpx

      - name: Run Alembic migrations
        working-directory: apps/quiz-pack-api
        run: alembic upgrade head

      - name: Run unit tests (no services needed)
        working-directory: apps/quiz-pack-api
        env:
          OPENAI_API_KEY: "sk-test-placeholder"
        run: pytest tests/ -v -m "not integration"

      - name: Run integration tests
        working-directory: apps/quiz-pack-api
        env:
          OPENAI_API_KEY: "sk-test-placeholder"
        run: pytest tests/integration/ -v -m integration

  verify-openapi:
    name: Verify OpenAPI Spec Generation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv pip install --system -e apps/quiz-agent
          uv pip install --system -e packages/shared

      - name: Start backend server
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-key' }}
        run: |
          cd apps/quiz-agent
          uvicorn app.main:app --host 0.0.0.0 --port 8002 &
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8002/docs >/dev/null; then
              echo "server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "server failed to respond within 90s" >&2
          exit 1

      - name: Verify OpenAPI spec is accessible
        run: |
          curl -f http://localhost:8002/docs || exit 1
          curl -f http://localhost:8002/openapi.json -o openapi.json
          ls -lh openapi.json

      - name: Upload OpenAPI spec as artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: openapi.json
          retention-days: 30
