name: iOS CI

on:
  push:
    # ralph/**: overnight-agent branches get a remote test run when pushed for
    # review, so a red branch is visible before it merges (#54 §54.8 item 1).
    branches: [main, 'ralph/**']
    paths:
      - 'apps/ios-app/**'
      - '.github/workflows/ios-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/ios-app/**'
      - '.github/workflows/ios-ci.yml'
  workflow_dispatch:

# macOS runners bill at 10× — never run two builds of the same ref concurrently.
concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    name: Build and Test iOS App
    # macos-latest: Xcode 26.3 may take time to land on GH-hosted runners; switch to macos-26 once available
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ hashFiles('apps/ios-app/Hangs/Hangs.xcodeproj/project.pbxproj') }}
          restore-keys: spm-

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show build environment
        run: |
          xcodebuild -version
          xcrun simctl list devices available | grep iPhone

      - name: Build and test
        run: |
          set -o pipefail
          cd apps/ios-app/Hangs
          xcodebuild test \
            -scheme Hangs-Local \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            | xcpretty

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: apps/ios-app/Hangs/TestResults.xcresult
          retention-days: 7

  verify-api-models:
    name: Verify API Models Match Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python and virtualenv
        # ubuntu-24.04's system Python (3.12) is externally managed (PEP 668), so
        # `uv pip install --system` fails / resolves the wrong interpreter. Install
        # 3.11 and put it in a project venv that the install + run steps both use.
        run: |
          uv python install 3.11
          uv venv --python 3.11

      - name: Install backend dependencies
        run: |
          uv pip install -e apps/quiz-agent
          uv pip install -e packages/shared

      - name: Start backend and archive OpenAPI spec
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-key' }}
        run: |
          # Start + poll + fetch must live in ONE step: a process backgrounded in a
          # prior `run:` step does not survive into the next step on GH runners.
          cd apps/quiz-agent
          "$GITHUB_WORKSPACE/.venv/bin/uvicorn" app.main:app --host 0.0.0.0 --port 8002 \
            > "$GITHUB_WORKSPACE/uvicorn.log" 2>&1 &
          UVICORN_PID=$!
          cd "$GITHUB_WORKSPACE"
          # The app boots in >5 s (TTS/pydub init), so poll for readiness.
          for i in $(seq 1 30); do
            curl -sf http://localhost:8002/openapi.json -o openapi-current.json && break
            if ! kill -0 "$UVICORN_PID" 2>/dev/null; then
              echo "::error::uvicorn exited before becoming ready"; cat uvicorn.log; exit 1
            fi
            echo "waiting for backend to accept connections… ($i/30)"
            sleep 2
          done
          if [ ! -s openapi-current.json ]; then
            echo "::error::backend never served openapi.json"; cat uvicorn.log; exit 1
          fi

      - name: Upload OpenAPI spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec-for-ios
          path: openapi-current.json
          retention-days: 7
